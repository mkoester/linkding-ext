<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Bookmarks+ icon. Violet matches the official linkding logo (#5856e0);
       a single white paperclip (nested-loop "Gem" clip) on a rounded-square tile. -->
  <rect width="128" height="128" rx="28" fill="#5856e0"/>
  <path d="M92 50 L92 92 A28 28 0 0 1 36 92 L36 46 A18.5 18.5 0 0 1 73 46 L73 84 A9 9 0 0 1 55 84 L55 60"
        fill="none" stroke="#ffffff" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "+" badge in the top-right corner (Bookmarks+) -->
  <g stroke="#ffffff" stroke-width="9" stroke-linecap="round">
    <line x1="88" y1="30" x2="110" y2="30"/>
    <line x1="99" y1="19" x2="99" y2="41"/>
  </g>
</svg>
